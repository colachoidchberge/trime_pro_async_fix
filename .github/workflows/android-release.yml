name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: /tmp/android-sdk
      ANDROID_SDK_ROOT: /tmp/android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install isolated Android SDK
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-28" "build-tools;28.0.3" "ndk;21.4.7075529"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Set up JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Gradle 6.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '6.5'

      - name: Read version
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'android:versionName="\K[^"]+' app/src/main/AndroidManifest.xml)
          VERSION_CODE=$(grep -oP 'android:versionCode="\K[^"]+' app/src/main/AndroidManifest.xml)
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify release signing key
        run: keytool -list -keystore signing/zhongwen.jks -storepass zhongwen -alias zhongwen

      - name: Build signed release APK
        env:
          TRIME_RELEASE_STORE_FILE: ../signing/zhongwen.jks
          TRIME_RELEASE_STORE_PASSWORD: zhongwen
          TRIME_RELEASE_KEY_ALIAS: zhongwen
          TRIME_RELEASE_KEY_PASSWORD: zhongwen
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk "release/chinese-input-ai-${{ steps.version.outputs.version_name }}-release-signed.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 中文输入法AI版 ${{ steps.version.outputs.version_name }}
          body: |
            Version: ${{ steps.version.outputs.version_name }}
            VersionCode: ${{ steps.version.outputs.version_code }}

            Changes:
            - Added independent Ctrl, Alt, and Win soft-key presets: Ctrl_L, Alt_L, and Win_L.
            - Ctrl_L sends Android Control_L, Alt_L sends Alt_L, and Win_L sends Meta_L.
            - Tapping Ctrl_L, Alt_L, or Win_L toggles that modifier for the next soft-key press; the modifier is then cleared automatically.
            - Added combo parsing aliases so layouts can use Ctrl+key, Control+key, Alt+key, Win+key, Meta+key, or Super+key.
            - Added Meta/Win key down/up simulation when sending Win/Meta combinations to target apps.
            - Kept the release APK signed with the fixed zhongwen.jks key.

            Usage:
            - Add standalone keys to a custom keyboard row with entries such as {click: Ctrl_L}, {click: Alt_L}, or {click: Win_L}.
            - Use one-shot modifier flow: tap Ctrl, then tap c to send Ctrl+c; tap Alt, then tap Tab to send Alt+Tab; tap Win, then tap d to send Win+d where the target app/system accepts it.
            - Use direct combo presets with send strings such as {label: Copy, send: Ctrl+c}, {label: Terminal, send: Ctrl+Alt+t}, or {label: Desktop, send: Win+d}.
            - If a target text field or Android version ignores Win/Meta shortcuts, the key event is still sent but the receiving app/system may choose not to handle it.

            Verification:
            - Built by GitHub Actions using Gradle 6.5 assembleRelease.
            - Release APK is signed with signing/zhongwen.jks, alias zhongwen.
          files: release/*.apk
          fail_on_unmatched_files: true

      - name: Keep only latest 3 releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' | while read tag; do
            [ -z "$tag" ] && continue
            gh release delete "$tag" --yes --cleanup-tag
          done
