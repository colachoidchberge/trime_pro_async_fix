name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: /tmp/android-sdk
      ANDROID_SDK_ROOT: /tmp/android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install isolated Android SDK
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-28" "build-tools;28.0.3" "ndk;21.4.7075529"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Set up JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Gradle 6.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '6.5'

      - name: Read version
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'android:versionName="\K[^"]+' app/src/main/AndroidManifest.xml)
          VERSION_CODE=$(grep -oP 'android:versionCode="\K[^"]+' app/src/main/AndroidManifest.xml)
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify release signing key
        run: keytool -list -keystore signing/zhongwen.jks -storepass zhongwen -alias zhongwen

      - name: Build signed release APK
        env:
          TRIME_RELEASE_STORE_FILE: ../signing/zhongwen.jks
          TRIME_RELEASE_STORE_PASSWORD: zhongwen
          TRIME_RELEASE_KEY_ALIAS: zhongwen
          TRIME_RELEASE_KEY_PASSWORD: zhongwen
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk "release/chinese-input-ai-${{ steps.version.outputs.version_name }}-release-signed.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 中文输入法AI版 ${{ steps.version.outputs.version_name }}
          body: |
            # 中文说明

            版本：${{ steps.version.outputs.version_name }}
            VersionCode：${{ steps.version.outputs.version_code }}

            改动内容：
            - 之后 GitHub Releases 发版说明固定使用中英双语格式。
            - 保留独立 Ctrl、Alt、Win 软键功能：Ctrl_L、Alt_L、Win_L。
            - 保留固定 zhongwen.jks 正式签名打包。

            使用方式：
            - 自定义键盘可加入 {click: Ctrl_L}、{click: Alt_L}、{click: Win_L}。
            - 点 Ctrl 后再点 c 发送 Ctrl+c；点 Alt 后再点 Tab 发送 Alt+Tab；点 Win 后再点 d 发送 Win+d。
            - 也可以直接配置组合键，例如 {label: Copy, send: Ctrl+c}、{label: Terminal, send: Ctrl+Alt+t}、{label: Desktop, send: Win+d}。
            - 部分 Android 版本或目标 App 可能忽略 Win/Meta 快捷键；本应用会发送事件，是否响应取决于接收方。

            验证：
            - GitHub Actions 使用 Gradle 6.5 assembleRelease 云端构建。
            - APK 使用 signing/zhongwen.jks，alias zhongwen 正式签名。

            # English Notes

            Version: ${{ steps.version.outputs.version_name }}
            VersionCode: ${{ steps.version.outputs.version_code }}

            Changes:
            - GitHub Releases notes will use a bilingual Chinese/English format from now on.
            - Kept independent Ctrl, Alt, and Win soft-key support: Ctrl_L, Alt_L, and Win_L.
            - Kept release APK signing with the fixed zhongwen.jks key.

            Usage:
            - Add standalone keys to a custom keyboard row with {click: Ctrl_L}, {click: Alt_L}, or {click: Win_L}.
            - Tap Ctrl then c to send Ctrl+c; tap Alt then Tab to send Alt+Tab; tap Win then d to send Win+d.
            - Direct combo presets are also supported, for example {label: Copy, send: Ctrl+c}, {label: Terminal, send: Ctrl+Alt+t}, or {label: Desktop, send: Win+d}.
            - Some Android versions or target apps may ignore Win/Meta shortcuts; the key event is sent, but handling depends on the receiver.

            Verification:
            - Built by GitHub Actions using Gradle 6.5 assembleRelease.
            - Release APK is signed with signing/zhongwen.jks, alias zhongwen.
          files: release/*.apk
          fail_on_unmatched_files: true

      - name: Keep only latest 3 releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' | while read tag; do
            [ -z "$tag" ] && continue
            gh release delete "$tag" --yes --cleanup-tag
          done
