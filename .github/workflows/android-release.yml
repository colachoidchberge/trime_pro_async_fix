name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: /tmp/android-sdk
      ANDROID_SDK_ROOT: /tmp/android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install isolated Android SDK
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-28" "build-tools;28.0.3" "ndk;21.4.7075529"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Set up JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Gradle 6.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '6.5'

      - name: Read version
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'android:versionName="\K[^"]+' app/src/main/AndroidManifest.xml)
          VERSION_CODE=$(grep -oP 'android:versionCode="\K[^"]+' app/src/main/AndroidManifest.xml)
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate release signing key
        run: |
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/trime-release.keystore" \
            -storepass trime-ai-release \
            -keypass trime-ai-release \
            -alias trime-ai \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Chinese Input Method AI, OU=AI Patch, O=Operit, L=Unknown, S=Unknown, C=CN"

      - name: Build signed release APK
        env:
          TRIME_RELEASE_STORE_FILE: ${{ runner.temp }}/trime-release.keystore
          TRIME_RELEASE_STORE_PASSWORD: trime-ai-release
          TRIME_RELEASE_KEY_ALIAS: trime-ai
          TRIME_RELEASE_KEY_PASSWORD: trime-ai-release
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk "release/chinese-input-ai-${{ steps.version.outputs.version_name }}-release-signed.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 中文输入法AI版 ${{ steps.version.outputs.version_name }}
          body: |
            Version: ${{ steps.version.outputs.version_name }}
            VersionCode: ${{ steps.version.outputs.version_code }}

            Changes:
            - Generated an ad-hoc release signing key during GitHub Actions build.
            - Built and published a signed release APK instead of a debug APK.
            - Kept the async Rime threading crash fix, first-key warmup fix, app rename, and AI patch notice.

            Verification:
            - Built by GitHub Actions using Gradle 6.5 assembleRelease.
            - Release APK is signed with the workflow-generated key.
          files: release/*.apk
          fail_on_unmatched_files: true

      - name: Keep only latest 3 releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' | while read tag; do
            [ -z "$tag" ] && continue
            gh release delete "$tag" --yes --cleanup-tag
          done
