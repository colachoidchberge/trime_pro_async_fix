name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-28" "build-tools;28.0.3" "ndk;21.4.7075529"

      - name: Set up JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Read version
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'android:versionName="\K[^"]+' app/src/main/AndroidManifest.xml)
          VERSION_CODE=$(grep -oP 'android:versionCode="\K[^"]+' app/src/main/AndroidManifest.xml)
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk "release/trime-pro-${{ steps.version.outputs.version_name }}-debug.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Trime Pro ${{ steps.version.outputs.version_name }}
          body: |
            Version: ${{ steps.version.outputs.version_name }}
            VersionCode: ${{ steps.version.outputs.version_code }}

            Changes:
            - Reworked async key processing to use a dedicated serialized Rime worker thread.
            - Synchronized Java Rime entry points to prevent UI reads/writes racing native librime/librime-lua calls.
            - Fixed crash path where multi-key rapid input could enter librime LuaTranslator and crash in lua_resume from Trime$AsyncThread.
            - Added safe async handler initialization and shutdown for the input method service lifecycle.

            Verification:
            - Built by GitHub Actions using ./gradlew assembleDebug.
          files: release/*.apk
          fail_on_unmatched_files: true

      - name: Keep only latest 3 releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' | while read tag; do
            [ -z "$tag" ] && continue
            gh release delete "$tag" --yes --cleanup-tag
          done
